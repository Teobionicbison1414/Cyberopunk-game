<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyberpunk VR District</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    #ui {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #0ff;
      font-family: monospace;
      background: rgba(0,0,0,0.7);
      padding: 8px 16px;
      border-radius: 6px;
      min-width: 260px;
      text-align: center;
      font-size: 14px;
    }
    #title {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      color: #f0f;
      font-family: monospace;
      text-shadow: 0 0 8px #f0f;
      font-size: 18px;
    }
  </style>
</head>
<body>
<div id="title">NEON SECTOR // WALK WITH WASD • CLICK TO TALK • ENTER VR WITH BUTTON</div>
<div id="ui">Look at a character and click to talk.</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/jsm/webxr/VRButton.js"></script>
<script>
  let scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x02030a, 0.06);
  scene.background = new THREE.Color(0x02030a);

  let camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(0, 1.6, 5);

  let renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);
  document.body.appendChild(THREE.VRButton.createButton(renderer));

  // Neon grid ground
  const groundGeo = new THREE.PlaneGeometry(80, 80, 80, 80);
  const groundMat = new THREE.MeshBasicMaterial({
    color: 0x041020,
    wireframe: true
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  // Holographic sky ring
  const ringGeo = new THREE.TorusGeometry(25, 0.4, 16, 100);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x5500ff });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.y = 15;
  scene.add(ring);

  // Buildings
  function addBuilding(x, z, h, color) {
    const geo = new THREE.BoxGeometry(1.8, h, 1.8);
    const mat = new THREE.MeshBasicMaterial({ color, wireframe: false });
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, h / 2, z);
    scene.add(m);

    // Neon strip
    const stripGeo = new THREE.BoxGeometry(0.1, h, 0.1);
    const stripMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
    const strip = new THREE.Mesh(stripGeo, stripMat);
    strip.position.set(x + 0.9, h / 2, z + 0.9);
    scene.add(strip);
  }

  for (let i = 0; i < 40; i++) {
    const x = (Math.random() - 0.5) * 50;
    const z = (Math.random() - 0.5) * 50;
    const h = 3 + Math.random() * 12;
    const color = new THREE.Color(`hsl(${200 + Math.random() * 80}, 100%, 50%)`);
    addBuilding(x, z, h, color);
  }

  // Ambient glow
  const ambient = new THREE.AmbientLight(0x44ffff, 0.5);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0xff00ff, 0.6);
  dirLight.position.set(5, 10, 2);
  scene.add(dirLight);

  // NPCs
  const npcs = [];
  const npcDialog = {
    "Cipher": [
      "Welcome to Neon Sector 7.",
      "Out here, data is more valuable than oxygen.",
      "You’re not on any registry. Interesting."
    ],
    "Glitch": [
      "The city loops every 23 hours. Watch the sky.",
      "I remember a version of this place that never existed.",
      "If you hear static in your thoughts, don’t answer it."
    ],
    "Nova": [
      "Stars don’t shine here. We fake them.",
      "You’re looking for answers. The city sells questions.",
      "Careful—some memories in this district are contagious."
    ],
    "Proxy": [
      "I speak for someone who can’t be seen.",
      "Your presence here is… statistically unlikely.",
      "If you feel the world stutter, that’s just a patch deploying."
    ]
  };

  function addNPC(x, z, name, color) {
    const bodyGeo = new THREE.CylinderGeometry(0.25, 0.25, 1.2, 16);
    const bodyMat = new THREE.MeshBasicMaterial({ color });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.set(x, 1.0, z);

    const headGeo = new THREE.SphereGeometry(0.28, 16, 16);
    const headMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.set(x, 1.7, z);

    const group = new THREE.Group();
    group.add(body);
    group.add(head);
    group.userData = { name };
    scene.add(group);
    npcs.push(group);
  }

  addNPC(0, -4, "Cipher", 0x5500ff);
  addNPC(3, -7, "Glitch", 0x00ff88);
  addNPC(-3, -6, "Nova", 0xff0088);
  addNPC(-1, -10, "Proxy", 0xffaa00);

  // UI + interaction
  const ui = document.getElementById('ui');
  const raycaster = new THREE.Raycaster();
  const tempDir = new THREE.Vector3();

  function talkToNPC() {
    camera.getWorldDirection(tempDir);
    raycaster.set(camera.position, tempDir);
    const hits = raycaster.intersectObjects(npcs, true);

    if (hits.length > 0) {
      let obj = hits[0].object;
      while (obj && !obj.userData.name && obj.parent) {
        obj = obj.parent;
      }
      if (obj && obj.userData.name) {
        const name = obj.userData.name;
        const lines = npcDialog[name] || ["..."];
        const line = lines[Math.floor(Math.random() * lines.length)];
        ui.textContent = name + ": " + line;
        return;
      }
    }
    ui.textContent = "No one responds. The neon hums quietly.";
  }

  window.addEventListener('click', talkToNPC);

  // Movement (desktop WASD)
  const keys = {};
  window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
  window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

  function move(delta) {
    const speed = 4;
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    dir.y = 0;
    dir.normalize();

    const right = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();

    if (keys['w']) camera.position.addScaledVector(dir, speed * delta);
    if (keys['s']) camera.position.addScaledVector(dir, -speed * delta);
    if (keys['a']) camera.position.addScaledVector(right, -speed * delta);
    if (keys['d']) camera.position.addScaledVector(right, speed * delta);
  }

  // Simple desktop mouse look (non‑VR)
  let isPointerLocked = false;
  document.body.addEventListener('click', () => {
    if (!renderer.xr.isPresenting && !isPointerLocked) {
      document.body.requestPointerLock();
    }
  });

  document.addEventListener('pointerlockchange', () => {
    isPointerLocked = !!document.pointerLockElement;
  });

  document.addEventListener('mousemove', (e) => {
    if (!isPointerLocked || renderer.xr.isPresenting) return;
    const sensitivity = 0.0025;
    camera.rotation.y -= e.movementX * sensitivity;
    camera.rotation.x -= e.movementY * sensitivity;
    camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
  });

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  renderer.setAnimationLoop((time) => {
    const delta = 0.016;
    move(delta);
    ring.rotation.y += 0.0015;
    renderer.render(scene, camera);
  });
</script>
</body>
</html>
